server:
  port: 8091

spring:
  cloud:
    gateway:
      routes: []
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${AUTH_SERVICE_URL:http://auth-service:8081}

logging:
  level:
    dev.rawad: DEBUG
    org.springframework.cloud.gateway: DEBUG
