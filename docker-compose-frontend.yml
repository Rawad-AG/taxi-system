# =============================================
# Taxi System - Frontend Ready
# =============================================
# This file pulls pre-built images from Docker Hub.
# No code building required.
#
# Setup:
# 1. Replace IMAGE_PLACEHOLDER values below with your Docker Hub images
# 2. Update .env file with your desired credentials
# 3. Run: docker-compose -f docker-compose-frontend.yml up -d
#
# =============================================

# Load environment variables from .env file
env_file:
  - .env

services:
  # ============================================
  # INFRASTRUCTURE - PostgreSQL
  # ============================================
  postgres:
    image: postgres:17-alpine
    container_name: taxi-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - taxi-network
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-init/init.sh:/docker-entrypoint-initdb.d/init.sh
    command: /bin/sh /docker-entrypoint-initdb.d/init.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # INFRASTRUCTURE - Cache
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: taxi-redis
    networks:
      - taxi-network
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # INFRASTRUCTURE - Message Broker (RabbitMQ)
  # ============================================
  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: taxi-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    networks:
      - taxi-network
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # INFRASTRUCTURE - Monitoring
  # ============================================
  prometheus:
    image: prom/prometheus:latest
    container_name: taxi-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - taxi-network
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"

  grafana:
    image: grafana/grafana:latest
    container_name: taxi-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: false
    networks:
      - taxi-network
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  # ============================================
  # SPRING CLOUD - Service Registry
  # ============================================
  discovery-service:
    image: YOUR_DOCKERHUB_USERNAME/taxi-discovery-service:latest
    container_name: taxi-discovery-service
    networks:
      - taxi-network
    ports:
      - "8761:8761"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8761/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ============================================
  # SPRING CLOUD - Config Server
  # ============================================
  config-service:
    image: YOUR_DOCKERHUB_USERNAME/taxi-config-service:latest
    container_name: taxi-config-service
    networks:
      - taxi-network
    ports:
      - "8888:8888"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    volumes:
      - ./config-repo:/config-repo
    depends_on:
      discovery-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8888/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ============================================
  # MICROSERVICES
  # ============================================
  auth-service:
    image: YOUR_DOCKERHUB_USERNAME/taxi-auth-service:latest
    container_name: taxi-auth-service
    networks:
      - taxi-network
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_CONFIG_IMPORT=config-server:http://config-service:8888
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=auth_db
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
    depends_on:
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  core-service:
