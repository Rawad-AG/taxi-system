    container_name: taxi-rating-service
    networks:
      - system-network
    ports:
      - "8087:8080"
    env_file: .env
    environment:
      - POSTGRES_DB=rating_db
    depends_on:
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  audit-service:
    image: rawad0/taxi-audit-service:latest
    container_name: taxi-audit-service
    networks:
      - system-network
    ports:
      - "8088:8080"
    env_file: .env
    environment:
      - POSTGRES_DB=audit_db
    depends_on:
