  bff-service:
    image: rawad0/taxi-bff-service:latest
    container_name: taxi-bff-service
    networks:
      - system-network
    ports:
      - "8090:8080"
    env_file: .env
    environment:
      - POSTGRES_DB=bff_db
    depends_on:
      discovery-service:
