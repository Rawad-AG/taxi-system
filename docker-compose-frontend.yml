services:
  # ============================================
  # INFRASTRUCTURE - PostgreSQL
  # ============================================
  db:
    image: rawad0/db:latest
    container_name: db
    env_file: .env
    networks:
      - system-network
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # INFRASTRUCTURE - Cache
  # ============================================
  redis:
    image: redis:latest
    container_name: taxi-redis
    env_file: .env
    networks:
      - system-network
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # INFRASTRUCTURE - Message Broker
  # ============================================
  rabbitmq:
    image: rabbitmq:latest
    container_name: taxi-rabbitmq
    env_file: .env
    networks:
      - system-network
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # INFRASTRUCTURE - Monitoring
  # ============================================
  prometheus:
    image: rawad0/monitoring-prometheus:latest
    container_name: taxi-prometheus
    env_file: .env
    networks:
      - system-network
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: taxi-grafana
    env_file: .env
    networks:
      - system-network
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  # ============================================
  # SPRING CLOUD - Discovery & Config
  # ============================================
  discovery-service:
    image: rawad0/taxi-discovery-service:latest
    container_name: taxi-discovery-service
    env_file: .env
    environment:
      - EUREKA_CLIENT_REGISTER_WITH_EUREKA=false
      - EUREKA_CLIENT_FETCH_REGISTRY=false
    networks:
      - system-network
    ports:
      - "8761:8080"
    depends_on:
      config-service:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5

  config-service:
    image: rawad0/taxi-config-service:latest
    container_name: taxi-config-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - system-network
    ports:
      - "8888:8080"
    healthcheck:
      test:
        ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5

  # ============================================
  # MICROSERVICES (Pulling from Docker Hub)
  # ============================================
  auth-service:
    image: rawad0/taxi-auth-service:latest
    container_name: taxi-auth-service
    networks:
      - system-network
    ports:
      - "8081:8080"
    env_file: .env
    environment:
      - POSTGRES_DB=auth_db
    depends_on:
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  core-service:
    image: rawad0/taxi-core-service:latest
    container_name: taxi-core-service
    networks:
      - system-network
    ports:
      - "8082:8080"
    env_file: .env
    environment:
      - POSTGRES_DB=core_db
    depends_on:
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  location-service:
    image: rawad0/taxi-location-service:latest
    container_name: taxi-location-service
    networks:
      - system-network
    ports:
      - "8083:8080"
    env_file: .env
    environment:
      - POSTGRES_DB=location_db
    depends_on:
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  fazaa-service:
    image: rawad0/taxi-fazaa-service:latest
    container_name: taxi-fazaa-service
    networks:
      - system-network
    ports:
      - "8084:8080"
    env_file: .env
    environment:
      - POSTGRES_DB=fazaa_db
    depends_on:
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  payment-service:
