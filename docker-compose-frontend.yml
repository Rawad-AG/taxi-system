    container_name: taxi-notification-service
    networks:
      - system-network
    ports:
      - "8086:8080"
    env_file: .env
    environment:
      - POSTGRES_DB=notification_db
    depends_on:
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
