    container_name: taxi-payment-service
    networks:
      - system-network
    ports:
      - "8085:8080"
    env_file: .env
    environment:
      - POSTGRES_DB=payment_db
    depends_on:
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
