        condition: service_healthy

  gateway-service:
    image: rawad0/taxi-gateway-service:latest
    container_name: taxi-gateway-service
    networks:
      - system-network
    ports:
      - "8091:8080"
    env_file: .env
    depends_on:
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
      redis:
        condition: service_healthy

  monitoring-service:
    image: rawad0/taxi-monitoring-service:latest
    container_name: taxi-monitoring-service
    networks:
      - system-network
    ports:
      - "9091:8080"
    env_file: .env
    depends_on:
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy

networks:
  system-network:
    driver: bridge
