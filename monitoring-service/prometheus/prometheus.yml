global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "discovery-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["discovery-service:8080"]

  - job_name: "config-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["config-service:8080"]

  - job_name: "auth-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["auth-service:8080"]

  - job_name: "core-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["core-service:8080"]

  - job_name: "location-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["location-service:8080"]

  - job_name: "fazaa-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["fazaa-service:8080"]

  - job_name: "payment-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
